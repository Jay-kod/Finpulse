version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finpulse-app
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - ML_SERVICE_URL=http://ml-service:8000
      - NLP_SERVICE_URL=http://ml-service:8000
      - DB_PASSWORD=root
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
      - /var/www/html/vendor
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      ml-service:
        condition: service_started
    networks:
      - finpulse-network

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finpulse-queue-worker
    restart: unless-stopped
    command: php artisan queue:work --timeout=90 --tries=3
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - ML_SERVICE_URL=http://ml-service:8000
      - NLP_SERVICE_URL=http://ml-service:8000
      - DB_PASSWORD=root
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
      - /var/www/html/vendor
    depends_on:
      - app
      - redis
      - mysql
    networks:
      - finpulse-network

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: finpulse-ml-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./ml-service/models:/app/models
    networks:
      - finpulse-network

  mysql:
    image: mysql:8.0
    container_name: finpulse-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: sentiment_analysis
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - finpulse-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-proot"]
      retries: 3
      timeout: 5s

  redis:
    image: redis:alpine
    container_name: finpulse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - finpulse-network

volumes:
  mysql-data:
  redis-data:

networks:
  finpulse-network:
    driver: bridge
