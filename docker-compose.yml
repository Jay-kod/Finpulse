version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finpulse-app
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - ML_SERVICE_URL=http://ml-service:8000
    env_file:
      - .env
    volumes:
      - ./.env:/var/www/html/.env
      - ./storage/app:/var/www/html/storage/app
      - ./storage/logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      ml-service:
        condition: service_started
    networks:
      - finpulse-network

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: finpulse-ml-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./ml-service/models:/app/models
    networks:
      - finpulse-network

  mysql:
    image: mysql:8.0
    container_name: finpulse-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-sentiment_analysis}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - finpulse-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD:-root}"]
      retries: 3
      timeout: 5s

  redis:
    image: redis:alpine
    container_name: finpulse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - finpulse-network

volumes:
  mysql-data:
  redis-data:

networks:
  finpulse-network:
    driver: bridge
